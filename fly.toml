# fly.toml — Trade Week SA–Russia
# App: tradeweek-sa-russia
# Docs: https://fly.io/docs/reference/configuration/

app = "tradeweek-sa-russia"
primary_region = "jnb"  # Johannesburg — closest to your audience

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[checks]
  [checks.alive]
    grace_period = "5s"
    interval = "15s"
    method = "get"
    path = "/"
    port = 8080
    timeout = "2s"
    type = "http"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
